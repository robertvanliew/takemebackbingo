<?xml version="1.0" encoding="UTF-8"?>
<!-- Take Me Back Bingo · favicon variant 3
     The "B" knocked OUT of the gold dauber (negative space). Same
     pattern as Spotify, Slack, Vercel — solid container shape with the
     letterform as a transparent cutout. At 16x16 this gives the most
     instant "logo mark" recognition. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="daub3" cx="0.35" cy="0.3" r="0.75">
      <stop offset="0%" stop-color="#F5D976"/>
      <stop offset="55%" stop-color="#C9962B"/>
      <stop offset="100%" stop-color="#A87B1E"/>
    </radialGradient>
    <!-- Mask: white area renders the gold; black B carves a hole -->
    <mask id="bCutout">
      <rect width="64" height="64" fill="white"/>
      <path fill="black" fill-rule="evenodd" d="M 19 17 H 36 C 42.5 17 46 20.5 46 26 C 46 29 44.5 31 43 31.8 C 45.5 32.8 47 35 47 38.5 C 47 44 43.5 47.5 36 47.5 H 19 Z M 26 23.5 V 30 H 34.5 C 36.8 30 38 28.7 38 26.7 C 38 24.7 36.8 23.5 34.5 23.5 Z M 26 35 V 41.5 H 35.5 C 38 41.5 39.2 40.2 39.2 38.2 C 39.2 36.2 38 35 35.5 35 Z"/>
    </mask>
  </defs>
  <!-- Gold dauber with B-shaped void -->
  <circle cx="32" cy="32" r="28" fill="url(#daub3)" mask="url(#bCutout)"/>
</svg>
