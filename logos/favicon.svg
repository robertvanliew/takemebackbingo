<!-- Take Me Back Bingo · favicon
     The "B" from the BINGO card, with the Bungee-style 3D drop-shadow
     treatment: cream face, brand-purple shadow offset down + right.
     Transparent background so the B reads cleanly on light or dark
     browser tab surfaces. Path-drawn (no font dependency) so it
     renders crisp at 16x16. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Purple drop-shadow "B" (behind, offset +3px down/right) -->
  <path fill="#7B2D8E" fill-rule="evenodd" d="M 17 15 H 38 C 46 15 50 19 50 26 C 50 30 48 32 46 33.5 C 49 35 51 38 51 42 C 51 49 47 53 38 53 H 17 Z M 25 22 V 30 H 37 C 40 30 41.5 28.5 41.5 26 C 41.5 23.5 40 22 37 22 Z M 25 37 V 46 H 38 C 42 46 43.5 44 43.5 41.5 C 43.5 39 42 37 38 37 Z"/>

  <!-- Warm cassette-brown "B" face on top -->
  <path fill="#5E3A1F" fill-rule="evenodd" d="M 14 12 H 35 C 43 12 47 16 47 23 C 47 27 45 29 43 30.5 C 46 32 48 35 48 39 C 48 46 44 50 35 50 H 14 Z M 22 19 V 27 H 34 C 37 27 38.5 25.5 38.5 23 C 38.5 20.5 37 19 34 19 Z M 22 34 V 43 H 35 C 39 43 40.5 41 40.5 38.5 C 40.5 36 39 34 35 34 Z"/>
</svg>
