<!-- Take Me Back Bingo · favicon
     The "B" from the BINGO card. Brand purple background, cream letterform,
     chunky display weight to match the Bungee treatment used on the live
     bingo card. Path-drawn (no font dependency) so it renders the same in
     every browser, at every size. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cassette-tape window: rounded square in brand purple -->
  <rect width="64" height="64" rx="10" fill="#7B2D8E"/>
  <!-- Chunky "B" in cream, with two cut-out bowls via evenodd fill rule -->
  <path fill="#F2EADB" fill-rule="evenodd" d="M 18 14 H 38 C 45 14 48 18 48 24 C 48 28 46 30 44 31 C 47 32 49 35 49 39 C 49 46 45 50 38 50 H 18 Z M 26 21 V 28 H 36 C 39 28 40 27 40 25 C 40 22 39 21 36 21 Z M 26 35 V 43 H 38 C 41 43 42 42 42 39 C 42 36 41 35 38 35 Z"/>
</svg>
